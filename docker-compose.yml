services:
  pulsewatch:
    build: .
    image: pulsewatch:latest
    container_name: pulsewatch
    ports:
      - "8000:8000"          # dashboard + API at http://localhost:8000
    volumes:
      # your local config (copy config.example.yaml to config.yaml first).
      # read-only: edit it on the host and restart to pick up changes.
      # ':z' relabels for SELinux hosts (Fedora/RHEL); a harmless no-op elsewhere.
      - ./config.yaml:/data/config.yaml:ro,z
      # named volume for the SQLite DB so history/incidents survive restarts.
      - pulsewatch-data:/data
    restart: unless-stopped
    # For multi-region, name this server's built-in worker and declare the
    # regions in config.yaml, then add worker containers like the one below:
    # command: ["pulsewatch", "serve", "--host", "0.0.0.0", "--port", "8000", "--region", "us-east"]

  # --- extra region worker (uncomment for multi-region) ---
  # A second worker process, no web server, sharing the same config + DB volume.
  # worker-eu-west:
  #   build: .
  #   image: pulsewatch:latest
  #   command: ["pulsewatch", "worker", "--region", "eu-west"]
  #   volumes:
  #     - ./config.yaml:/data/config.yaml:ro,z
  #     - pulsewatch-data:/data
  #   restart: unless-stopped

volumes:
  pulsewatch-data:
