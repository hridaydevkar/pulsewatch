# Copy this file to config.yaml and fill in your own values:
#   cp config.example.yaml config.yaml
#
# List the services you want to monitor here.
# check_interval_seconds: how often to ping this service
# failure_threshold: consecutive failures before an incident is opened

services:
  - name: "Example API"
    url: "https://httpbin.org/status/200"
    check_interval_seconds: 30
    failure_threshold: 3

  - name: "Flaky Demo Service"
    url: "https://httpbin.org/status/200,500"
    check_interval_seconds: 30
    failure_threshold: 3

  # --- upstream dependencies (check_type: dependency); uncomment to use ---

  # AWS region health — down only if your region/services are impacted:
  # - name: "AWS us-east-1"
  #   check_type: dependency
  #   dependency_kind: aws_status
  #   region: "us-east-1"
  #   services: ["EC2", "S3"]        # optional; omit to match any service in the region
  #   check_interval_seconds: 300
  #   failure_threshold: 1

  # Database connectivity (runs SELECT 1; install the driver, e.g. psycopg2-binary):
  # - name: "Primary Postgres"
  #   check_type: dependency
  #   dependency_kind: database
  #   connection_string: "postgresql://user:pass@localhost:5432/mydb"
  #   check_interval_seconds: 60
  #   failure_threshold: 2

  # Third-party API status field (Stripe: down unless indicator == none):
  # - name: "Stripe API"
  #   check_type: dependency
  #   dependency_kind: custom_api
  #   url: "https://status.stripe.com/api/v2/status.json"
  #   json_field: "status.indicator"
  #   expected_value: "none"
  #   check_interval_seconds: 120
  #   failure_threshold: 2

# Alert channels: one block per destination to notify on down/recovery events.
# With none enabled, alerts are just logged to the console. Uncomment a block
# and drop in your own webhook URL / email to enable it.
alerts: []
  # - type: discord
  #   webhook_url: "https://discord.com/api/webhooks/000000000000000000/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
  # - type: slack
  #   webhook_url: "https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX"
  # - type: email
  #   to: "oncall@example.com"
  #   from: "pulsewatch@example.com"    # optional; defaults to the SMTP user
  #   # SMTP host/port/credentials are read from environment variables:
  #   #   PULSEWATCH_SMTP_HOST, PULSEWATCH_SMTP_PORT (default 587),
  #   #   PULSEWATCH_SMTP_USER, PULSEWATCH_SMTP_PASSWORD

# Regions: named check workers. Each region runs as its own process and reports
# results tagged with its name to the shared database; the dashboard shows a
# per-region breakdown once more than one region reports on a service. With no
# regions declared, there's a single implicit "local" region.
#
# Run one worker process per region (all pointed at this same config/DB):
#   pulsewatch serve  --region us-east      # web dashboard + the us-east worker
#   pulsewatch worker --region eu-west      # an extra worker, no web server
# regions:
#   - name: "us-east"
#   - name: "eu-west"
